<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

        /* משתני צבעים ועיצוב תואמים לאתר הראשי */
        :root {
            --bg-main: #0b0e14;
            --bg-card: #131822;
            --border-color: #1f2a37;
            --primary-blue: #00b4ff;
            --primary-blue-hover: #009ce0;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --success: #10b981;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Heebo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header מקוצר */
        header {
            background: rgba(11, 14, 20, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 180, 255, 0.1);
            border: 1px solid rgba(0, 180, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            font-size: 1.2rem;
        }

        .logo-text h2 { font-size: 1.2rem; font-weight: 800; line-height: 1; }
        .logo-text p { font-size: 0.75rem; color: var(--text-gray); margin: 0; }

        .back-btn {
            color: var(--text-gray);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--text-white); }
